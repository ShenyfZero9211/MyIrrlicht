# Irrlicht Audio Visualization Settings (v0.0.5)

# Overall visual scaling multiplier (1.0 = Default)
# 整体视觉绽放倍率 (控制所有波浪的宏观缩放)
VisualMultiplier = 1.0

# Temporal smoothing factor (Lower = Slower/Smoother, Higher = Snappier)
# 时间平滑因子 (越低越柔和连贯，越高越凌厉实时)
Smoothness = 0.15

# Audio Input Gain Multiplier (Higher = More sensitive to quiet audio)
# 音频输入增益倍率 (越高对轻微的声音越敏感)
Gain = 10.0

# Number of spectrum bars (Recommended: 32, 64, 128)
# 频谱条柱数量
BarCount = 32

# [High Frequency Compensation]
# HF_TiltBase: High frequency boost intensity base (Range: 1.0 ~ 20.0)
# 高频补偿底数 (决定了右侧柱子的整体活跃海拔)
HF_TiltBase = 4.5

# HF_TiltPower: Curvature of the high frequency boost (1.0 = Linear, >1.0 = Curve)
# 高频补偿指数 (决定了右侧随频率上升而增加补偿的陡峭度)
HF_TiltPower = 1.2

# Peak Fall Gravity: (default 0.22). Higher makes peaks fall faster.
# 峰值下落重力 (控制白色色块下落加速度，数值越大掉得越快)
PeakGravity = 0.02

# Max Visual Height: (default 40.0). Higher allows bars to grow taller.
# 最大视觉高度限制 (通过非线性压缩确保柱子不刺破顶边。数值越大允许海拔越高)
MaxHeight = 40.0
